- stage: validate
  displayName: Validate TypeScript Packages
  pool: $(privatePool)
  jobs:
  - job: verify_assistant_workflow
    steps:
    - checkout: self
      clean: true
    - script: pnpm install --frozen-lockfile
      displayName: Install dependencies
    - script: pnpm run ts:version:check
      displayName: Verify package versions
    - script: pnpm --filter @uns-kit/assistant-workflow run verify
      displayName: Verify Assistant workflow package
- stage: version_tag
  displayName: Add Version Tag
  dependsOn: validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  pool: $(privatePool)
  jobs:
  - job: add_tags
    steps:
    - checkout: self
      persistCredentials: true
      clean: true
    - script: |
        tag=$(node -pe "require('./package.json').version")
        git tag $tag
        git push origin $tag
      displayName: "Add version tag from package.json"
    
    
  
