[tool.poetry]
name = "uns-kit"
version = "0.1.3"
description = "Lightweight Python UNS MQTT client (pub/sub + infra topics)"
authors = ["Aljoša Vister <aljosa.vister@gmail.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "uns_kit", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
aiomqtt = "^2.4.0"
click = "^8.1.7"
infisicalsdk = { version = "^1.0.15", optional = true }
graypy = "^2.1.0"
fastapi = { version = "^0.116.1", optional = true }
uvicorn = { version = "^0.35.0", optional = true }
apscheduler = { version = "^3.11.0", optional = true }
pyjwt = { version = "^2.10.1", extras = ["crypto"], optional = true }
psycopg = { version = "^3.2.9", extras = ["binary"], optional = true }
oracledb = { version = "^2.5.1", optional = true }
pandas = { version = "^2.3.3", optional = true }
pyarrow = { version = "^21.0.0", optional = true }

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"
pytest-asyncio = "^0.24.0"
ruff = "^0.6.9"
mypy = "^1.11.2"

[tool.poetry.scripts]
uns-kit-py = "uns_kit.cli:main"

[tool.poetry.extras]
infisical = ["infisicalsdk"]
api = ["fastapi", "uvicorn", "pyjwt", "pandas", "pyarrow"]
cron = ["apscheduler"]
database = ["psycopg", "oracledb"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
